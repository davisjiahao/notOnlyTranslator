<svg xmlns="http://www.w3.org/2000/svg" width="920" height="680" viewBox="0 0 920 680">
  <!-- 背景渐变 -->
  <defs>
    <linearGradient id="bgGradient920" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow920" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="920" height="680" fill="url(#bgGradient920)"/>

  <!-- 装饰圆 -->
  <circle cx="780" cy="120" r="180" fill="#60a5fa" opacity="0.25"/>
  <circle cx="120" cy="580" r="120" fill="#93c5fd" opacity="0.15"/>
  <circle cx="850" cy="550" r="80" fill="#ffffff" opacity="0.1"/>

  <!-- 左侧内容区域 -->
  <g transform="translate(80, 100)">
    <!-- 图标 -->
    <rect x="0" y="0" width="80" height="80" rx="20" fill="#ffffff" filter="url(#shadow920)"/>
    <text x="40" y="60" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="48" font-weight="bold" fill="#3b82f6" text-anchor="middle">N</text>

    <!-- 标题 -->
    <text x="100" y="35" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="42" font-weight="bold" fill="#ffffff">NotOnlyTranslator</text>
    <text x="100" y="70" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" fill="#bfdbfe">智能分级翻译助手</text>

    <!-- 核心卖点 -->
    <text x="0" y="140" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28" font-weight="bold" fill="#ffffff">只翻译你不会的词</text>

    <!-- 功能列表 -->
    <g transform="translate(0, 180)">
      <circle cx="10" cy="10" r="6" fill="#86efac"/>
      <text x="30" y="16" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" fill="#e0f2fe">智能识别你的英语水平</text>

      <circle cx="10" cy="45" r="6" fill="#86efac"/>
      <text x="30" y="51" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" fill="#e0f2fe">只翻译超出词汇量的单词</text>

      <circle cx="10" cy="80" r="6" fill="#86efac"/>
      <text x="30" y="86" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" fill="#e0f2fe">在阅读中自然积累词汇</text>

      <circle cx="10" cy="115" r="6" fill="#86efac"/>
      <text x="30" y="121" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" fill="#e0f2fe">考研/四六级/留学必备</text>
    </g>
  </g>

  <!-- 右侧浏览器模拟 -->
  <g transform="translate(480, 80)">
    <!-- 浏览器窗口 -->
    <rect x="0" y="0" width="380" height="480" rx="12" fill="#1e293b" filter="url(#shadow920)"/>
    <!-- 标题栏 -->
    <rect x="0" y="0" width="380" height="40" rx="12" fill="#334155"/>
    <rect x="0" y="28" width="380" height="12" fill="#1e293b"/>
    <!-- 窗口按钮 -->
    <circle cx="25" cy="20" r="6" fill="#ef4444"/>
    <circle cx="45" cy="20" r="6" fill="#f59e0b"/>
    <circle cx="65" cy="20" r="6" fill="#22c55e"/>
    <!-- 地址栏 -->
    <rect x="90" y="12" width="270" height="16" rx="8" fill="#475569"/>

    <!-- 网页内容模拟 -->
    <rect x="20" y="60" width="340" height="16" rx="3" fill="#475569"/>
    <rect x="20" y="90" width="300" height="16" rx="3" fill="#475569"/>
    <rect x="20" y="120" width="320" height="16" rx="3" fill="#475569"/>

    <!-- 高亮单词示例 1 -->
    <rect x="20" y="155" width="120" height="20" rx="4" fill="#fcd34d"/>
    <text x="30" y="170" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#92400e">翻译: 显著的</text>

    <rect x="20" y="185" width="340" height="16" rx="3" fill="#475569"/>
    <rect x="20" y="215" width="280" height="16" rx="3" fill="#475569"/>

    <!-- 高亮单词示例 2 -->
    <rect x="20" y="250" width="100" height="20" rx="4" fill="#86efac"/>
    <text x="30" y="265" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#166534">已掌握</text>

    <rect x="20" y="280" width="340" height="16" rx="3" fill="#475569"/>
    <rect x="20" y="310" width="260" height="16" rx="3" fill="#475569"/>

    <!-- 高亮单词示例 3 -->
    <rect x="20" y="345" width="90" height="20" rx="4" fill="#fca5a5"/>
    <text x="30" y="360" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#991b1b">翻译: 必要的</text>

    <rect x="20" y="375" width="340" height="16" rx="3" fill="#475569"/>
  </g>

  <!-- 底部标签 -->
  <g transform="translate(80, 540)">
    <rect x="0" y="0" width="140" height="40" rx="20" fill="#ffffff" opacity="0.2"/>
    <text x="70" y="27" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" fill="#ffffff" text-anchor="middle">智能翻译</text>

    <rect x="160" y="0" width="140" height="40" rx="20" fill="#ffffff" opacity="0.2"/>
    <text x="230" y="27" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" fill="#ffffff" text-anchor="middle">词汇学习</text>

    <rect x="320" y="0" width="140" height="40" rx="20" fill="#ffffff" opacity="0.2"/>
    <text x="390" y="27" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" fill="#ffffff" text-anchor="middle">进度追踪</text>

    <rect x="480" y="0" width="140" height="40" rx="20" fill="#ffffff" opacity="0.2"/>
    <text x="550" y="27" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" fill="#ffffff" text-anchor="middle">隐私保护</text>
  </g>
</svg>
