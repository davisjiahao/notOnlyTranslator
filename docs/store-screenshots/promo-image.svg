<svg xmlns="http://www.w3.org/2000/svg" width="440" height="280" viewBox="0 0 440 280">
  <!-- 背景渐变 -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="440" height="280" fill="url(#bgGradient)"/>

  <!-- 装饰圆 -->
  <circle cx="380" cy="60" r="80" fill="#60a5fa" opacity="0.3"/>
  <circle cx="60" cy="220" r="60" fill="#93c5fd" opacity="0.2"/>

  <!-- 主内容区域 -->
  <g transform="translate(40, 60)">
    <!-- 图标 -->
    <rect x="0" y="0" width="48" height="48" rx="12" fill="#ffffff" filter="url(#shadow)"/>
    <text x="24" y="36" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28" font-weight="bold" fill="#3b82f6" text-anchor="middle">N</text>

    <!-- 标题 -->
    <text x="64" y="20" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" font-weight="bold" fill="#ffffff">NotOnlyTranslator</text>
    <text x="64" y="40" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#bfdbfe">智能分级翻译助手</text>
  </g>

  <!-- 功能展示区域 -->
  <g transform="translate(40, 140)">
    <!-- 模拟文本行 1 -->
    <rect x="0" y="0" width="360" height="16" rx="3" fill="#ffffff" opacity="0.15"/>
    <rect x="0" y="2" width="60" height="12" rx="2" fill="#fcd34d" opacity="0.9"/>

    <!-- 模拟文本行 2 -->
    <rect x="0" y="28" width="320" height="16" rx="3" fill="#ffffff" opacity="0.15"/>
    <rect x="100" y="30" width="80" height="12" rx="2" fill="#86efac" opacity="0.9"/>

    <!-- 模拟文本行 3 -->
    <rect x="0" y="56" width="340" height="16" rx="3" fill="#ffffff" opacity="0.15"/>
    <rect x="200" y="58" width="50" height="12" rx="2" fill="#fca5a5" opacity="0.9"/>
  </g>

  <!-- 底部标签 -->
  <g transform="translate(40, 240)">
    <rect x="0" y="0" width="80" height="24" rx="12" fill="#ffffff" opacity="0.2"/>
    <text x="40" y="17" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" fill="#ffffff" text-anchor="middle">智能翻译</text>

    <rect x="92" y="0" width="80" height="24" rx="12" fill="#ffffff" opacity="0.2"/>
    <text x="132" y="17" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" fill="#ffffff" text-anchor="middle">词汇学习</text>

    <rect x="184" y="0" width="80" height="24" rx="12" fill="#ffffff" opacity="0.2"/>
    <text x="224" y="17" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" fill="#ffffff" text-anchor="middle">进度追踪</text>
  </g>
</svg>
