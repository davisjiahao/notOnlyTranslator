<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="560" viewBox="0 0 1400 560">
  <!-- 背景渐变 -->
  <defs>
    <linearGradient id="bgGradient1400" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow1400" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="1400" height="560" fill="url(#bgGradient1400)"/>

  <!-- 装饰圆 -->
  <circle cx="1200" cy="80" r="200" fill="#60a5fa" opacity="0.2"/>
  <circle cx="100" cy="480" r="150" fill="#93c5fd" opacity="0.15"/>
  <circle cx="1300" cy="450" r="100" fill="#ffffff" opacity="0.1"/>

  <!-- 左侧内容区域 -->
  <g transform="translate(100, 100)">
    <!-- 图标 -->
    <rect x="0" y="0" width="72" height="72" rx="18" fill="#ffffff" filter="url(#shadow1400)"/>
    <text x="36" y="54" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="42" font-weight="bold" fill="#3b82f6" text-anchor="middle">N</text>

    <!-- 标题 -->
    <text x="92" y="32" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="38" font-weight="bold" fill="#ffffff">NotOnlyTranslator</text>
    <text x="92" y="62" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" fill="#bfdbfe">智能分级翻译助手</text>

    <!-- 核心卖点 -->
    <text x="0" y="130" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="48" font-weight="bold" fill="#ffffff">只翻译你不会的词</text>
    <text x="0" y="180" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" fill="#e0f2fe">告别全文翻译，在阅读中自然提升词汇量</text>

    <!-- 功能标签 -->
    <g transform="translate(0, 220)">
      <rect x="0" y="0" width="120" height="36" rx="18" fill="#ffffff" opacity="0.2"/>
      <text x="60" y="25" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">智能分级</text>

      <rect x="140" y="0" width="120" height="36" rx="18" fill="#ffffff" opacity="0.2"/>
      <text x="200" y="25" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">词汇积累</text>

      <rect x="280" y="0" width="120" height="36" rx="18" fill="#ffffff" opacity="0.2"/>
      <text x="340" y="25" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">隐私保护</text>
    </g>
  </g>

  <!-- 右侧浏览器模拟 -->
  <g transform="translate(700, 60)">
    <!-- 浏览器窗口 -->
    <rect x="0" y="0" width="580" height="420" rx="12" fill="#1e293b" filter="url(#shadow1400)"/>
    <!-- 标题栏 -->
    <rect x="0" y="0" width="580" height="44" rx="12" fill="#334155"/>
    <rect x="0" y="32" width="580" height="12" fill="#1e293b"/>
    <!-- 窗口按钮 -->
    <circle cx="28" cy="22" r="7" fill="#ef4444"/>
    <circle cx="50" cy="22" r="7" fill="#f59e0b"/>
    <circle cx="72" cy="22" r="7" fill="#22c55e"/>
    <!-- 地址栏 -->
    <rect x="100" y="14" width="460" height="16" rx="8" fill="#475569"/>

    <!-- 网页内容模拟 -->
    <g transform="translate(30, 70)">
      <rect x="0" y="0" width="520" height="18" rx="3" fill="#475569"/>
      <rect x="0" y="35" width="460" height="18" rx="3" fill="#475569"/>
      <rect x="0" y="70" width="500" height="18" rx="3" fill="#475569"/>

      <!-- 高亮单词示例 1 -->
      <rect x="0" y="110" width="140" height="24" rx="4" fill="#fcd34d"/>
      <text x="12" y="128" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#92400e">翻译: 显著的</text>

      <rect x="0" y="145" width="520" height="18" rx="3" fill="#475569"/>
      <rect x="0" y="180" width="420" height="18" rx="3" fill="#475569"/>

      <!-- 高亮单词示例 2 -->
      <rect x="0" y="220" width="120" height="24" rx="4" fill="#86efac"/>
      <text x="12" y="238" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#166534">已掌握</text>

      <rect x="0" y="255" width="520" height="18" rx="3" fill="#475569"/>

      <!-- 高亮单词示例 3 -->
      <rect x="0" y="295" width="110" height="24" rx="4" fill="#fca5a5"/>
      <text x="12" y="313" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#991b1b">翻译: 必要的</text>

      <rect x="0" y="330" width="520" height="18" rx="3" fill="#475569"/>
    </g>
  </g>

  <!-- 底部使用场景 -->
  <g transform="translate(100, 440)">
    <text x="0" y="30" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" fill="#bfdbfe">适合：考研党 / 四六级考生 / 留学预备 / 职场人士 / 英语爱好者</text>
  </g>

  <!-- CTA 按钮 -->
  <g transform="translate(1150, 440)">
    <rect x="0" y="0" width="140" height="44" rx="22" fill="#ffffff" filter="url(#shadow1400)"/>
    <text x="70" y="29" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="bold" fill="#3b82f6" text-anchor="middle">立即安装</text>
  </g>
</svg>
